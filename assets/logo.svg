  </g>
  
  <!-- Text -->
  <text x="210" y="65" font-family="Montserrat, sans-serif" font-size="32" font-weight="700" fill="#003366" letter-spacing="2">WHITECAP</text>
  <text x="210" y="100" font-family="Montserrat, sans-serif" font-size="28" font-weight="300" fill="#003366" letter-spacing="8">WEALTH</text>
</svg>
