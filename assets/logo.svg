<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Mountain & Wave Icon -->
  <g fill="none" stroke="#003366" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Mountain Peaks -->
    <path d="M40 80 L70 40 L100 70 L130 30 L170 80" />
    <!-- The Wave -->
    <path d="M30 90 C 60 90, 80 60, 110 60 C 140 60, 160 90, 190 90 L 190 95 L 30 95 Z" fill="#003366" />
    <!-- Whitecap detail -->
