<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Navy Background for Preview (Optional, can be removed for transparency) -->
  <rect width="600" height="400" fill="#003366" />
  
  <g transform="translate(50, 50) scale(0.8)">
    <!-- Mountain Line (Stroke) -->
    <path d="M 50 300 
             L 180 150 
             L 220 190 
             L 320 80 
             L 450 220" 
          stroke="white" 
          stroke-width="22" 
          fill="none" 
          stroke-linecap="butt" 
          stroke-linejoin="miter" />
    
    <!-- The Wave (Solid Shape) -->
    <path d="M 230 310 
             C 300 310, 380 280, 450 200 
             C 500 130, 450 110, 400 130 
             C 350 150, 380 200, 420 220 
             C 380 180, 320 180, 280 220 
             C 240 260, 250 310, 230 310 Z" 
          fill="white" />
          
    <!-- Connecting bottom line -->
    <path d="M 50 300 L 230 310" stroke="white" stroke-width="22" />
  </g>
</svg>
