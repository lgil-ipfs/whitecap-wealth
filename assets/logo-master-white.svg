<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="white-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur" />
      <feOffset in="blur" dx="1" dy="1" result="offsetBlur" />
      <feMerge>
        <feMergeNode in="offsetBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(40, 20) scale(1.2)" filter="url(#white-glow)">
    <path d="M 20 110 L 85 30 L 110 65 L 155 15 L 205 75 L 190 85 L 155 40 L 110 90 L 85 55 L 35 115 Z" fill="white" />
    <path d="M 90 120 C 140 125, 180 110, 210 70 C 230 40, 200 20, 175 40 C 155 55, 165 85, 195 90 C 165 90, 135 70, 125 40 C 115 70, 100 120, 90 120 Z" fill="white" />
  </g>

  <text x="320" y="90" font-family="'Cormorant Garamond', serif" font-size="64" font-weight="700" fill="white" letter-spacing="4">WHITECAP</text>
  <text x="320" y="145" font-family="'Montserrat', sans-serif" font-size="48" font-weight="300" fill="white" letter-spacing="22">WEALTH</text>
</svg>
